# Analyzer config for the Flutter client.
#
# Uses the Flutter lint ruleset (flutter_lints 6.x, parity with the workspace
# `lints ^6.0.0`). Generated Riverpod glue (`*.g.dart`) is excluded from
# analysis — it is machine-produced and not hand-maintained.
#
# NOTE (build-verification fix, 2026-07-14): the `custom_lint` analyzer plugin
# is temporarily disabled here for the same reason custom_lint / riverpod_lint
# were dropped from pubspec.yaml — custom_lint 0.8.1 is pinned to analyzer
# ^8.0.0 and cannot co-exist with the Riverpod 4.x code-gen stack (analyzer
# ^12) at the ratified Flutter 3.44.0 pin. Re-enable the plugin once custom_lint
# adopts analyzer ^9+.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Same architectural discipline as the workspace root analysis_options.yaml.
    always_declare_return_types: error
    prefer_final_locals: error
    unawaited_futures: error
    avoid_dynamic_calls: error
