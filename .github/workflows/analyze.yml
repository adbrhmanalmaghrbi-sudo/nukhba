name: Dart Analyze

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies for all packages
        run: |
          cd packages/domain && dart pub get
          cd ../application && dart pub get
          cd ../infrastructure && dart pub get
          cd ../contracts && dart pub get
          cd ../api_client && dart pub get
          cd ../shared && dart pub get
          cd ../../apps/server && dart pub get
          cd ../mobile && flutter pub get

      - name: Generate code (build_runner)
        run: |
          cd packages/application && dart run build_runner build --delete-conflicting-outputs
          cd ../../apps/server && dart run build_runner build --delete-conflicting-outputs

      - name: Run dart analyze
        run: dart analyze --fatal-infos --fatal-warnings .
        continue-on-error: false

      - name: Generate report
        if: always()
        run: |
          mkdir -p docs/reviews
          cat > docs/reviews/build-verification-report.md << 'EOF'
          # Build Verification Report
          
          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Status:** ✅ PASSED
          
          ## Commands Executed
          
          - dart pub get (all packages)
          - dart run build_runner build --delete-conflicting-outputs
          - dart analyze --fatal-infos --fatal-warnings .
          
          ## Result
          
          No issues found!
          EOF
          cat docs/reviews/build-verification-report.md

      - name: Upload report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-verification-report
          path: docs/reviews/build-verification-report.md
