name: Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  analyze:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get


      - name: Generate code (build_runner)
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Auto-fix lint issues
        working-directory: apps/mobile
        run: dart fix --apply

      - name: Verify formatting
        working-directory: apps/mobile
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze --fatal-infos --fatal-warnings

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get


      - name: Generate code (build_runner)
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        working-directory: apps/mobile
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/mobile/coverage/lcov.info
          retention-days: 14

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Ensure platform folders exist
        working-directory: apps/mobile
        run: flutter create --platforms=android,web . --project-name nukhba


      - name: Generate code (build_runner)
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        working-directory: apps/mobile
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nukhba-android-apk
          path: apps/mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

  build_web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get
      - name: Ensure platform folders exist
        working-directory: apps/mobile
        run: flutter create --platforms=android,web . --project-name nukhba


      - name: Generate code (build_runner)
        working-directory: apps/mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build web
        working-directory: apps/mobile
        run: flutter build web --release

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nukhba-web
          path: apps/mobile/build/web
          retention-days: 14
