name: Format Fix (Manual)

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: format-fix
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Read pinned Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          channel: stable

      - name: Apply dart format
        run: dart format .

      - name: Commit and push if there are changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "style: apply dart format [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No formatting changes needed."
          fi
