name: domain
description: Pure domain layer. Depends only on `shared`. No frameworks, no IO.
publish_to: none
version: 0.1.0
resolution: workspace

environment:
  sdk: ^3.9.0

# In a pub workspace, local members are resolved by the workspace itself, so
# `any` is the correct constraint (path deps are redundant and can conflict
# with `resolution: workspace`).
dependencies:
  shared: any

dev_dependencies:
  test: ^1.26.0
  lints: ^6.0.0
